<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <h1>ElectroChat<span class="highlight"></span></h1>
            <p>Chat asistente para temas de electrónica, microcontroladores y automatización</p>
        </header>

        <main class="glass-panel chat-panel">
            <div id="chat-messages" class="chat-messages">
                <div class="message bot">
                    <div class="message-content">
                        <p>¡Hola! Soy ElectroChat, tu asistente de electrónica. ¿En qué te puedo ayudar hoy?</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="prompt" rows="1" placeholder="Escribe un mensaje..."></textarea>
                <button id="generate-btn" class="glow-on-hover send-btn" aria-label="Enviar mensaje">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20"
                        height="20">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/script.js"></script>
</body>

</html>
